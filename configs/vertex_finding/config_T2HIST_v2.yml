# End-to-end Tracks-to-Histogram Training — v2 (UNet_1000_v2)
# Composition-based model: MaskedDNN (T2KDE) + UNet_1000_v2 (K2H)

# ===================================================
# Data configurations

data_file: /share/lazy/qibinlei/recoTrackNPV_jets_pubindices_1000bins_incbounds_Target_Y_split.h5
output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training configurations

device_id: 3
n_events: 51000
train_split: [0.7, 0.25, 0.05]
n_epochs: 400
warmup_epochs: 0  # warmup already done in first 100 epochs; set to 0 for resume
batch_size: 128
num_workers: 16
learning_rate: 0.0001
asymmetry_param: 2.5
use_mse_loss: true

save_weights: true
save_frequency: 10
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/

experimentname: "ATLAS 2025 - Tracks to Histogram v2"
runname: "T2HIST_v2_100epochs"

# ===================================================
# Model configurations

model_type: v2

models_config:
  n_input_features: 7
  n_latent_channels: 1
  dropout: 0.25

# Pretrained component checkpoints (loaded by TracksToHist_v2.from_checkpoints)
pretrained_tracks2kde: /data/home/matmauro/codice/PV-Finder/model_weights/reproduction_KDE_A_z_matmauro_run1_200_epoch_130_fullstate.pth
pretrained_kde2hist: /data/home/matmauro/codice/PV-Finder/model_weights/K2H_v2_interp_200epochs_epoch_190_fullstate.pth
