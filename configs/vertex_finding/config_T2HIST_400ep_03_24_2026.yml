# End-to-end Tracks-to-Histogram training - 400 epochs - 03/24/2026
# Exact reproduction of Qi Bin's approach:
#   MSE loss, Adam lr=0.001, no warmup, no scheduler
# Initialized from T2KDE epoch 100 + K2H epoch 150 (400ep runs)

# ===================================================
# Data configurations

data_file: /share/lazy/qibinlei/recoTrackNPV_jets_pubindices_1000bins_incbounds_Target_Y_split.h5
output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training configurations

device_id: 2
n_events: 51000
train_split: [0.7, 0.25, 0.05]
n_epochs: 400
batch_size: 128
num_workers: 16
learning_rate: 0.001

# Use MSE loss (Qi Bin's convention for E2E)
use_mse_loss: true
asymmetry_param: 2.5

save_weights: true
save_frequency: 10
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/03_24_2026/

experimentname: "ATLAS 2025 Reproduction - Tracks to Histogram"
runname: "reproduction_T2HIST_400ep_T2KDE100_K2H150"

# ===================================================
# Model configurations

models_config:
  n_input_features: 7
  n_latent_channels: 1
  dropout: 0.25

# ===================================================
# Pretrained weights for initialization

pretrained_weights: "separate_models"
pretrained_tracks2kde: /data/home/matmauro/codice/PV-Finder/model_weights/03_24_2026/reproduction_KDE_A_z_400ep_epoch_100.pyt
pretrained_kde2hist: /data/home/matmauro/codice/PV-Finder/model_weights/03_24_2026/reproduction_KDE2HIST_400ep_epoch_150.pyt
