# HLLHC PU200 — MLP warmup + End-to-End training
# No KDE supervision (KDEs unavailable at PU200)

# ===================================================
# Data configurations

data_file: /data/home/matmauro/codice/PV-Finder/data/run4/hllhc_pu200_training.h5
output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training configurations

device_id: 0
n_events: 99800
train_split: [0.7, 0.25, 0.05]
batch_size: 128
num_workers: 16

# ===================================================
# Phase 1: MLP Warmup

phase1_epochs: 50
phase1_learning_rate: 0.001

# ===================================================
# Phase 2: End-to-End Training

phase2_epochs: 400
phase2_learning_rate: 0.001

# ===================================================
# Loss

use_mse_loss: true
asymmetry_param: 2.5

# ===================================================
# Checkpointing

save_weights: true
save_frequency: 10
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/
log_folder: /data/home/matmauro/codice/PV-Finder/outputs/logs/

# ===================================================
# MLflow

experimentname: "HLLHC PU200 — E2E from scratch"
runname: "hllhc_pu200_mlp50_e2e400"

# ===================================================
# Model

models_config:
  n_input_features: 7
  n_latent_channels: 1
  dropout: 0.25
