# HLLHC PU200 — v4b: v4 with a corrected (per-step) LR warmup
#
# Only change vs config_hllhc_pu200_e2e_v4.yml is the Phase-2 LR schedule.
#
# Problem in v4 (diagnosed 2026-06-04 from MLflow):
#   `scheduler.step()` is called once per epoch, and `phase2_warmup_epochs: 1`
#   makes LinearLR(total_iters=1) hold the ENTIRE first epoch (~247k steps,
#   ~7.5 h) at 0.01·lr = 1e-6 (model effectively frozen), then jump 100x to
#   1e-4 at the epoch-1->2 boundary. That cliff is exactly where val loss
#   stepped up and started wobbling and efficiency stopped improving.
#
# Fix: per-step scheduler with a real 3000-step linear ramp 1e-6 -> 1e-4,
#   then cosine decay to eta_min over the rest of training. No cliff, and the
#   first epoch actually trains. Backward-compatible: leaving these two keys
#   out reverts to the legacy per-epoch behaviour.

# ===================================================
# Data — list of HDF5 paths concatenated into one ConcatDataset
data_file:
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601229_e8481_s4494_r16438_PU200.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601229_e8481_s4494_r16633_PU200.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_1.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_2.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_3.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_4.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_5.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_withTiming_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_6.h5

output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training
device_id: 0                 # GPU 0 free on 2026-06-04 (v4 live run is on GPU 1)
n_events: 2741800            # documentation only
train_split: [0.96, 0.03, 0.01]   # globally shuffled before partition
batch_size: 128
num_workers: 16
prefetch_factor: 4
log_every_n_steps: 500            # MLflow step-level train_loss+lr cadence
mini_val_every_n_steps: 2000      # MSE-only mini-val (~1.5% overhead)
mini_val_eff_every_n_steps: 20000 # MSE+eff+FPR mini-val (~2% overhead)
mini_val_n_batches: 30            # cached val subset size (~250 MB)

max_grad_norm: 1.0

# ===================================================
# Phase 1 — MLP warmup (UNet frozen)
phase1_epochs: 3
phase1_learning_rate: 0.001

# ===================================================
# Phase 2 — full E2E with PER-STEP warmup + cosine decay
# 3 epochs: v4 plateaued by ~epoch 1.5 and 1 epoch is ~6-7.5 h. With the fixed
# warmup, epoch 1 trains at the productive LR, so 3 epochs covers convergence +
# a full cosine anneal (LR high through ep1-2, decays to eta_min by end of ep3).
phase2_epochs: 3
phase2_learning_rate: 0.0001
phase2_warmup_epochs: 1            # ignored when phase2_warmup_steps is set
phase2_cosine_eta_min_frac: 0.01
phase2_step_scheduler: true        # step the LR scheduler every batch
phase2_warmup_steps: 3000          # smooth 1e-6 -> 1e-4 ramp over 3000 batches

# ===================================================
# Loss
use_mse_loss: true
asymmetry_param: 2.5

# ===================================================
# Checkpointing
save_weights: true
save_frequency: 1
save_every_n_steps: 30000       # mid-epoch .pth checkpoints so eval can start sooner
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/
log_folder: /data/home/matmauro/codice/PV-Finder/outputs/logs/

# ===================================================
# MLflow
experimentname: "HLLHC PU200 — E2E v4b (per-step warmup)"
runname: "hllhc_pu200_e2e_v4b_3ep_280ch_4lat_stepwarmup"

# ===================================================
# Model — identical to v4
models_config:
  model_type: "v2"
  n_input_features: 7
  n_latent_channels: 4
  dropout: 0.25
  n_unet_channels: 280
  l_hidden_nodes: [128, 128, 128, 128, 128]
