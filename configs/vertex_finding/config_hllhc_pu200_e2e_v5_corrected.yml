# HLLHC PU200 — v5: v4b recipe with CORRECTED target widths
#
# Identical to config_hllhc_pu200_e2e_v4b_stepwarmup.yml except the data
# files, which are rebuilt with the 'hllhc_corrected' resolution preset
# (A=0.1239 mm, B=0.4583, C=-0.0073): the original 'hllhc' preset came from
# a fit whose low-multiplicity widths were inflated by wrong-match background
# (see resolution_fit_v2.py, note Fig 2.3). Corrected widths make n_trk=2-5
# target peaks 20-30% narrower and ~25% taller — exactly where the finder's
# misses live. Everything else is kept identical for a clean A/B vs v4b.

# ===================================================
# Data — list of HDF5 paths concatenated into one ConcatDataset
data_file:
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601229_e8481_s4494_r16438_PU200.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601229_e8481_s4494_r16633_PU200.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_1.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_2.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_3.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_4.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_5.h5
  - /data/home/matmauro/codice/PV-Finder/data/run4/PU200_corrected_h5/ATLAS_PVFinderData_601237_e8481_s4494_r16633_PU200_6.h5

output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training
device_id: 0
n_events: 2741800            # documentation only
train_split: [0.96, 0.03, 0.01]   # globally shuffled before partition
batch_size: 128
num_workers: 16
prefetch_factor: 4
log_every_n_steps: 500
mini_val_every_n_steps: 2000
mini_val_eff_every_n_steps: 20000
mini_val_n_batches: 30

max_grad_norm: 1.0

# ===================================================
# Phase 1 — MLP warmup (UNet frozen)
phase1_epochs: 3
phase1_learning_rate: 0.001

# ===================================================
# Phase 2 — full E2E with PER-STEP warmup + cosine decay (v4b recipe)
phase2_epochs: 3
phase2_learning_rate: 0.0001
phase2_warmup_epochs: 1            # ignored when phase2_warmup_steps is set
phase2_cosine_eta_min_frac: 0.01
phase2_step_scheduler: true
phase2_warmup_steps: 3000

# ===================================================
# Loss
use_mse_loss: true
asymmetry_param: 2.5

# ===================================================
# Checkpointing
save_weights: true
save_frequency: 1
save_every_n_steps: 30000
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/
log_folder: /data/home/matmauro/codice/PV-Finder/outputs/logs/

# ===================================================
# MLflow
experimentname: "HLLHC PU200 — E2E v5 (corrected target widths)"
runname: "hllhc_pu200_e2e_v5_correctedwidths_3ep"

# ===================================================
# Model — identical to v4/v4b
models_config:
  model_type: "v2"
  n_input_features: 7
  n_latent_channels: 4
  dropout: 0.25
  n_unet_channels: 280
  l_hidden_nodes: [128, 128, 128, 128, 128]
