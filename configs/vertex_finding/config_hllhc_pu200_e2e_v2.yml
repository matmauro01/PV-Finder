# HLLHC PU200 — LR-stable E2E training (v2)
#
# Fixes the mid-training divergence observed in v1 (lr=1e-3 in Phase 2) at μ≈200.
# Changes vs config_hllhc_pu200_e2e.yml:
#   - Phase 2 LR: 1e-3 → 1e-4 (main fix)
#   - Phase 2 LR schedule: 5-epoch linear warmup (0.01x→1x) then cosine decay to 1% of base lr
#   - Gradient clipping: max_norm = 1.0 (both phases)
#   - Model width bump: 64 → 96 UNet channels, [100]*5 → [128]*5 MLP hidden nodes
#
# Uses train_hllhc_e2e.py (not train_mlp_hist_then_e2e.py) because Phase 2 needs
# the custom loop with grad clipping and LR scheduling.

# ===================================================
# Data

data_file: /data/home/matmauro/codice/PV-Finder/data/run4/hllhc_pu200_training.h5
output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training

device_id: 0
n_events: 99800
train_split: [0.7, 0.25, 0.05]
batch_size: 128
num_workers: 16

# Gradient clipping applies to both phases (v1 had none).
max_grad_norm: 1.0

# ===================================================
# Phase 1 — MLP warmup (UNet frozen)
# Phase 1 converged fine in v1, so lr stays at 1e-3.

phase1_epochs: 50
phase1_learning_rate: 0.001

# ===================================================
# Phase 2 — full E2E with warmup + cosine decay
# base_lr = 1e-4 (10x lower than v1)
# warmup: 5 epochs linear 0.01*base_lr → base_lr
# cosine: remaining epochs, decaying to base_lr * eta_min_frac = 1e-6

phase2_epochs: 400
phase2_learning_rate: 0.0001
phase2_warmup_epochs: 5
phase2_cosine_eta_min_frac: 0.01

# ===================================================
# Loss

use_mse_loss: true
asymmetry_param: 2.5  # unused when use_mse_loss=true

# ===================================================
# Checkpointing

save_weights: true
save_frequency: 10
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/
log_folder: /data/home/matmauro/codice/PV-Finder/outputs/logs/

# ===================================================
# MLflow

experimentname: "HLLHC PU200 — E2E stable (v2)"
runname: "hllhc_pu200_mlp50_e2e400_v2"

# ===================================================
# Model
#
# n_unet_channels: 64 → 96 (1.5x width, ~2.25x UNet params)
# l_hidden_nodes:  [100]*5 → [128]*5 (1.28x, ~1.6x MLP params)
# Total parameter bump is roughly 1.8×.

models_config:
  n_input_features: 7
  n_latent_channels: 1
  dropout: 0.25
  n_unet_channels: 96
  l_hidden_nodes: [128, 128, 128, 128, 128]
