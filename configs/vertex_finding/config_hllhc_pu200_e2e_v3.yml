# HLLHC PU200 — 10x scaled E2E with UNet_v2 architecture (v3)
#
# Major changes vs v2:
#   - Architecture: TracksToHist_v2 (UNet_v2 with interp upsampling, 4x bottleneck)
#   - UNet channels: 96 → 280 (large capacity increase)
#   - n_latent_channels: 1 → 4 (MLP outputs 4 spatial views, richer UNet input)
#   - Phase 2 epochs: 400 → 200 (converges earlier, saves compute)
#   - Phase 2 LR: 1e-4 → 5e-5 (halved for larger model stability)
#   - Phase 2 warmup: 5 → 7 epochs
#
# Total params: ~3.55M (9.9x of v1 default 358K, 5.2x of v2 HLLHC 680K)
#
# Resolution improvements from v2 architecture:
#   - 4x bottleneck (250 bins) vs 8x (125 bins) → preserves peak shape
#   - Interpolation upsampling → no checkerboard/aliasing artifacts
#   - k=15 first encoder kernel → reduced sidelobe coupling (vs k=25)
#   - 4 latent channels → MLP can express multiple track representations

# ===================================================
# Data

data_file: /data/home/matmauro/codice/PV-Finder/data/run4/hllhc_pu200_training.h5
output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training

device_id: 0
n_events: 99800
train_split: [0.7, 0.25, 0.05]
batch_size: 128
num_workers: 16

max_grad_norm: 1.0

# ===================================================
# Phase 1 — MLP warmup (UNet frozen)

phase1_epochs: 50
phase1_learning_rate: 0.001

# ===================================================
# Phase 2 — full E2E with warmup + cosine decay
# LR halved from v2 (1e-4 → 5e-5) for larger model stability.

phase2_epochs: 200
phase2_learning_rate: 0.00005
phase2_warmup_epochs: 7
phase2_cosine_eta_min_frac: 0.01

# ===================================================
# Loss

use_mse_loss: true
asymmetry_param: 2.5

# ===================================================
# Checkpointing

save_weights: true
save_frequency: 10
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/
log_folder: /data/home/matmauro/codice/PV-Finder/outputs/logs/

# ===================================================
# MLflow

experimentname: "HLLHC PU200 — E2E v3 (10x scaled UNet_v2, 4ch latent)"
runname: "hllhc_pu200_e2e_v3_280ch_4lat"

# ===================================================
# Model
#
# model_type: v2 → uses TracksToHist_v2 (MaskedDNN + UNet_1000_v2)
# n_unet_channels: 280 → ~2.96M UNet params
# n_latent_channels: 4 → MLP outputs 4 × 1000 bins, richer UNet input
# l_hidden_nodes: [128]*5 → unchanged from v2
# Total: ~3.55M params (9.9x v1 default, 5.2x v2 HLLHC)

models_config:
  model_type: "v2"
  n_input_features: 7
  n_latent_channels: 4
  dropout: 0.25
  n_unet_channels: 280
  l_hidden_nodes: [128, 128, 128, 128, 128]
