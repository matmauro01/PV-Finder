# Configuration for end-to-end Tracks-to-Histogram Training
# Initialized from pretrained Tracks-to-KDE (epoch 250) and KDE-to-Hist (epoch 290)

# ===================================================
# Data configurations

# Path to input h5 file
data_file: /share/lazy/qibinlei/recoTrackNPV_jets_pubindices_1000bins_incbounds_Target_Y_split.h5

# Path to output directory
output_file_path: /data/home/matmauro/codice/PV-Finder/outputs/

# ===================================================
# Training configurations

# GPU device ID to use
device_id: 0

# Number of events to process
n_events: 51000

# Train, validation, and test split ratios
train_split: [0.7, 0.25, 0.05]

# Number of training epochs
n_epochs: 400

# Batch size for training
batch_size: 128

# Number of data loading workers
num_workers: 16

# Initial learning rate
learning_rate: 0.001

# Asymmetry parameter for alt loss function
asymmetry_param: 2.5

# Use MSE loss instead of asymmetric loss (set to true for MSE)
# NOTE: Qi Bin uses MSE loss for combined model training
use_mse_loss: true

# To save model weights during training
save_weights: true

# Frequency (in epochs) to save weights
save_frequency: 10

# Directory to save model weights
save_folder: /data/home/matmauro/codice/PV-Finder/model_weights/

# Specifics for MLFlow
experimentname: "ATLAS 2025 Reproduction - Tracks to Histogram"

runname: "tracks2hist_1channel_200epochs_T2KDE250_KDE2H290"

# ===================================================
# Model configurations

models_config:
  # Number of input track features (d_0, z_0, sig_d, sig_z, sig_dz, theta, phi)
  n_input_features: 7

  # Number of latent KDE channels (1 for KDE-A-z only, 4 for all KDEs)
  n_latent_channels: 1

  # Dropout probability (0.25 for FPR~0.72, 0.4 was giving FPR~1.46)
  dropout: 0.25

# ===================================================
# Pretrained weights for initialization

# Initialize from separate Tracks-to-KDE and KDE-to-Histogram models
# Set pretrained_weights to a non-.pth value to trigger separate model loading
pretrained_weights: "separate_models"

# Paths to pretrained component models
pretrained_tracks2kde: /data/home/matmauro/codice/PV-Finder/model_weights/reproduction_KDE_A_z_matmauro_301epochs_epoch_250.pyt
pretrained_kde2hist: /data/home/matmauro/codice/PV-Finder/model_weights/reproduction_KDE2HIST_matmauro_301epochs_epoch_290.pyt
