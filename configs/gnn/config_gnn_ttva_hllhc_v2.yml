# GNN TTVA training on HL-LHC PU200 truth graphs — v2 (stability recipe)
# Same data/architecture as config_gnn_ttva_hllhc.yml (one change at a time:
# the v1 run at fixed lr=1e-3 dipped hard at epochs 50-75 before recovering).
# v2 adds a cosine LR schedule (1e-3 -> 1e-5) and gradient clipping (1.0).
#
# Usage (inside tmux):
#   python -u -m gnn.training.train_ttva -c configs/gnn/config_gnn_ttva_hllhc_v2.yml

# --- Data ---
data_file: "/data/home/matmauro/codice/PV-Finder/data/run4/ttva_graphs/pu200_truth_k20_30k.pt"
train_split: [0.7, 0.25, 0.05]  # 21k train / 7.5k val / 1.5k test (indices 28500+)
batch_size: 32
num_workers: 2

# --- Model architecture (unchanged from v1 / mu~60 baseline) ---
model_config:
  track_input_size: 8   # d0, z0, d0_err, z0_err, cov, theta, phi, pt_scaled
  pv_input_size: 2      # z_position, peak_height
  hidden_dim: 32
  num_heads: 4
  edge_attr_dim: 3      # long_sig, horiz_sig, |dz|
  dropout: 0.25

# --- Training ---
n_epochs: 201
learning_rate: 0.001
lr_schedule:
  type: cosine
  eta_min: 0.00001
grad_clip: 1.0
device_id: 0

# --- Checkpointing ---
save_weights: true
save_frequency: 25
save_folder: "/data/home/matmauro/codice/PV-Finder/model_weights/ttva_gnn_hllhc_v2/"

# --- MLflow ---
experimentname: "TTVA_GNN"
runname: "ttva_gat_pu200_k20_v2_cosine"
